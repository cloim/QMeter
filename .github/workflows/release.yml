name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Validate release tag format
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v\d+\.\d+\.\d+([-.][0-9A-Za-z.-]+)?$') {
            Write-Error "Tag '$tag' is not a valid release tag (expected vMAJOR.MINOR.PATCH)."
            exit 1
          }

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --locked

      - name: Build release binaries
        run: cargo build --release --workspace --locked

      - name: Stage artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          Copy-Item target/release/qmeter.exe artifacts/qmeter.exe
          Copy-Item target/release/qmeter-tray.exe artifacts/qmeter-tray.exe
          Compress-Archive -Path artifacts/qmeter.exe, artifacts/qmeter-tray.exe -DestinationPath artifacts/qmeter-windows-${{ github.ref_name }}.zip -Force

      - name: Publish GitHub release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --notes "QMeter Rust native release $tag"
          }
          gh release upload $tag artifacts/qmeter.exe artifacts/qmeter-tray.exe artifacts/qmeter-windows-${{ github.ref_name }}.zip --clobber

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qmeter-windows-${{ github.ref_name }}
          path: artifacts/*
